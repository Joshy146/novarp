<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Roleplay | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@next/dist/aos.css" rel="stylesheet">
</head>
<body class="bg-gray-950 text-white font-sans">

    <!-- Navigation -->
    <nav class="p-6 flex justify-between items-center bg-gray-950/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-800">
        <img src="New Project (54).png" alt="Logo" class="h-12 w-12 rounded-full">
        <div class="space-x-8 font-bold text-sm tracking-widest">
            <a href="index.html" class="hover:text-cyan-400 transition-colors">HOME</a>
            <a href="gallery.html" class="hover:text-purple-400 transition-colors">GALLERY</a>
            <a href="store.html" class="bg-gradient-to-r from-cyan-500 to-purple-600 px-6 py-2 rounded-full hover:scale-105 transition-all">STORE</a>
        </div>
    </nav>

    <!-- Hero -->
    <header class="h-[80vh] flex flex-col justify-center items-center text-center px-4" data-aos="fade-up">
        <h1 class="text-7xl font-black mb-6 bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-purple-500">NOVA ROLEPLAY</h1>
        <p class="text-xl text-gray-400 mb-8 max-w-lg">The galaxy's most immersive experience. Join our growing community today.</p>
        <button class="border border-cyan-500 px-8 py-4 rounded-xl hover:bg-cyan-500 transition-all">JOIN SERVER</button>
    </header>

    <!-- Media Spotlight -->
    <section class="max-w-6xl mx-auto p-6 mb-20" data-aos="fade-up">
        <h3 class="text-3xl font-bold mb-8 text-center text-purple-400">SERVER SPOTLIGHT</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <img src="image_1d579a.jpg" class="w-full h-64 object-cover rounded-2xl border border-gray-700 hover:scale-105 transition-transform cursor-pointer">
            <img src="image_1d57bd.jpg" class="w-full h-64 object-cover rounded-2xl border border-gray-700 hover:scale-105 transition-transform cursor-pointer">
            <img src="image_1d57f4.jpg" class="w-full h-64 object-cover rounded-2xl border border-gray-700 hover:scale-105 transition-transform cursor-pointer">
            <img src="image_1d5ac6.jpg" class="w-full h-64 object-cover rounded-2xl border border-gray-700 hover:scale-105 transition-transform cursor-pointer">
        </div>
    </section>

    <!-- Dashboard Section -->
    <div class="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-2 gap-8 mb-20">
        <!-- Live Server Status -->
        <div class="bg-gray-900 p-8 rounded-2xl border border-gray-800 shadow-2xl" data-aos="fade-right">
            <h3 class="text-2xl font-bold mb-4 text-cyan-400">Server Status</h3>
            <div id="player-count" class="text-4xl font-black">Loading...</div>
            <p class="text-gray-400 mt-2">Live connection via FiveM</p>
        </div>

        <!-- Discord Widget (FeedPulse) -->
        <div class="bg-gray-900 p-4 rounded-2xl border border-gray-800 shadow-2xl flex flex-col items-center justify-center" data-aos="fade-left">
            <h3 class="text-xl font-bold mb-4">Join Our Discord</h3>
            <script async src="https://visitor-tracker-129.emergent.host/api/embed/discord-members.js?guild=1359037143779115088&theme=obsidian&show_name=1&sz=large"></script>
        </div>
    </div>

    <!-- Meet The Team -->
    <section class="max-w-4xl mx-auto p-12 mb-20 relative group" data-aos="zoom-in">
        <div class="absolute inset-0 backdrop-blur-sm bg-gray-900/50 flex items-center justify-center rounded-3xl border border-gray-800">
            <div class="text-center">
                <p class="text-4xl font-black text-white">COMING SOON</p>
                <p class="text-gray-400 mt-2">Staff profiles are being cleaned up.</p>
            </div>
        </div>
        <div class="h-64 flex items-center justify-center bg-gray-800 rounded-3xl border border-gray-700">
            <h2 class="text-5xl font-bold opacity-20">MEET THE TEAM</h2>
        </div>
    </section>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
        
        async function updateStatus() {
            try {
                // Using your FiveM Server ID: 3yg75qb
                const response = await fetch("https://servers-frontend.fivem.net/api/mirrors/details/3yg75qb");
                const data = await response.json();
                document.getElementById("player-count").innerText = `${data.Data.players.length} / ${data.Data.sv_maxclients} Players Online`;
            } catch (e) {
                document.getElementById("player-count").innerText = "Offline";
            }
        }
        updateStatus();
    </script>
</body>
</html>
