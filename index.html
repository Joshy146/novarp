<!DOCTYPE html>
<html lang="en">

    <title>Nova Roleplay | Home</title>
    <!-- Tailwind for styling -->
    <script src="https://cdn.tailwindcss.com"></script>

<body class="bg-gray-950 text-white font-sans">

    <!-- Navigation -->

        <div class="space-x-8 font-bold text-sm tracking-widest">
            <a href="index.html" class="hover:text-cyan-400 transition-colors">HOME</a>

    <!-- Hero -->
    <header class="h-[80vh] flex flex-col justify-center items-center text-center px-4" data-aos="fade-up">

        <p class="text-xl text-gray-400 mb-8 max-w-lg">The galaxy's most immersive experience. Join our growing community today.</p>
        
        <div class="flex gap-4">

            <a href="https://discord.gg/e9cfVMBC2g" target="_blank" rel="noopener noreferrer" class="border border-purple-500 text-purple-400 hover:bg-purple-500 hover:text-white px-8 py-4 rounded-xl transition-all">JOIN DISCORD</a>
        </div>
    </header>

    <!-- Media Spotlight -->
    <section class="max-w-6xl mx-auto p-6 mb-20" data-aos="fade-up">

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <img src="image_1d579a.jpg" alt="Gallery Image" class="w-full h-64 object-cover rounded-2xl border border-gray-700 hover:scale-105 transition-transform cursor-pointer">
            <img src="image_1d57bd.jpg" alt="Gallery Image" class="w-full h-64 object-cover rounded-2xl border border-gray-700 hover:scale-105 transition-transform cursor-pointer">
            <img src="image_1d57f4.jpg" alt="Gallery Image" class="w-full h-64 object-cover rounded-2xl border border-gray-700 hover:scale-105 transition-transform cursor-pointer">
            <img src="image_1d5ac6.jpg" alt="Gallery Image" class="w-full h-64 object-cover rounded-2xl border border-gray-700 hover:scale-105 transition-transform cursor-pointer">
        </div>
    </section>

    <!-- Meet The Team -->
    <section class="max-w-4xl mx-auto p-12 mb-20 relative group" data-aos="zoom-in">
        <div class="absolute inset-0 backdrop-blur-sm bg-gray-900/50 flex items-center justify-center rounded-3xl border border-gray-800">
            <div class="text-center">
                <p class="text-4xl font-black text-white">COMING SOON</p>
                <p class="text-gray-400 mt-2">Staff profiles are being cleaned up.</p>
            </div>
        </div>
        <div class="h-64 flex items-center justify-center bg-gray-800 rounded-3xl border border-gray-700">

        </div>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
    </script>
